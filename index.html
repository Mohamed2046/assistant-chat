<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعدي الذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
        .config-box { padding: 10px; background: #333; color: white; display: flex; gap: 10px; }
        .config-box input { flex: 1; padding: 5px; border-radius: 4px; border: none; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .user { background-color: #0084ff; color: white; align-self: flex-start; }
        .bot { background-color: #e4e6eb; color: black; align-self: flex-end; }
        .input-box { display: flex; border-top: 1px solid #ddd; padding: 10px; background: #fff; }
        .input-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .input-box button { background: #0084ff; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- صندوق إدخال المفتاح بشكل آمن -->
    <div class="config-box">
        <label>مفتاح API:</label>
        <input type="password" id="apiKeyInput" placeholder="أدخل مفتاح AIHubMix هنا..." />
        <button onclick="saveKey()">حفظ</button>
    </div>

    <!-- شاشة المحادثة -->
    <div class="chat-box" id="chatBox">
        <div class="message bot">أهلاً بك! أنا جاهز للمحادثة. (تأكد من إدخال وحفظ المفتاح بالأعلى أولاً)</div>
    </div>

    <!-- صندوق الكتابة -->
    <div class="input-box">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    let chatHistory = [{ "role": "system", "content": "أنت مساعد ذكي تتحدث باللهجة المصرية الودودة." }];

    // استرجاع المفتاح لو محفوظ مسبقاً
    document.getElementById('apiKeyInput').value = localStorage.getItem('aihubmix_key') || '';

    function saveKey() {
        const key = document.getElementById('apiKeyInput').value;
        localStorage.setItem('aihubmix_key', key);
        alert('تم حفظ المفتاح بأمان في متصفحك!');
    }

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const userText = inputField.value.trim();
        const apiKey = localStorage.getItem('aihubmix_key');

        if (!userText) return;
        if (!apiKey) { alert('من فضلك أدخل الـ API Key واضغط حفظ أولاً!'); return; }

        // عرض رسالة المستخدم
        appendMessage(userText, 'user');
        inputField.value = '';

        // إضافة الرسالة للتاريخ
        chatHistory.push({ "role": "user", "content": userText });

        try {
            // الاتصال بـ AIHubMix عبر Fetch API مباشرة من المتصفح
            const response = await fetch('https://aihubmix.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-5.6-sol",
                    messages: chatHistory,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const botReply = data.choices[0].message.content;

            // عرض رد البوت وإضافته للتاريخ
            appendMessage(botReply, 'bot');
            chatHistory.push({ "role": "assistant", "content": botReply });

        } catch (error) {
            appendMessage('عذراً، حدث خطأ في الاتصال بالـ API.', 'bot');
            console.error(error);
        }
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // النزول التلقائي لآخر رسالة
    }
</script>

</body>
</html>
